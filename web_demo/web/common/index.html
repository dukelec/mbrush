<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="apple-touch-icon" sizes="192x192" href="./img/icon.png" />
<link rel="icon" type="image/png" href="./img/icon.png" />
<link rel="manifest" href="./manifest.json" />
<title>HKPrinter Web App</title>
<link rel="stylesheet" href="./css/bulma-1.0.2.css">
<link rel="stylesheet" href="./css/fontawesome-7.0.1.all.min.css">
<style>
#log {
    width: 100%;
    height: 250px;
    border: 1px solid #ccc;
    padding: 5px;
    font-family: monospace;
    white-space: pre-wrap;
    overflow-y: auto;
}
button {
    margin: 5px 0;
}
</style>
</head>
<body>

<section class="section">
    <div class="container is-flex is-align-items-center is-justify-content-space-between">
        <h1 class="title is-size-4">HKPrinter Web App</h1>
        <p><span id="app_name"></span> / v1.8</p>
    </div>

    <div class="container">
        <div class="button is-small" style="margin: 5px 0;">
            <input class="file-input" type="file" id="open_image">
            <i class="fa fa-file-image"></i> &nbsp; Open Image
        </div>
        <br>
        <img id="img_preview" style="height: 120px; width: 240px; border: 1px solid #ccc; padding: 1px;"></img>
        <br>
        <br>
        <button class="button is-small" id="connect_btn"><i class="fa fa-link"></i> &nbsp; BLE Connect</button>
        <button class="button is-small" id="disconnect_btn" disabled><i class="fa fa-unlink"></i> &nbsp; Disconnect</button>
        <button class="button is-small" id="dev_info_btn" disabled><i class="fa fa-info"></i> &nbsp; Read Device Info</button>
        <br>
        <div class="is-inline-flex" style="align-items: center; gap: 0.5rem;">
            <label class="checkbox"><input type="checkbox" id="write_flash_en" onchange="input_change()"> Write to Flash</label>
            <label class="checkbox"><input type="checkbox" id="big_mtu_en" onchange="input_change()"> Big MTU</label>
            <button class="button is-small" id="write_dat_btn" disabled><i class="fa fa-print"></i> &nbsp; Transfer Image</button>
        </div>
        <br>
        <br>
        <div class="is-inline-flex" style="align-items: center; gap: 0.5rem;">
            Debug Level:
            <select id="debug_level" onchange="input_change()">
                <option value=1>Info</option>
                <option value=2>Debug</option>
                <option value=3>Verbose</option>
            </select>
            Max Length: <input type="text" id="log_max_len" size="5" value="5000" onchange="input_change()">
            <button class="button is-small" id="clear_log_btn"><i class="fa fa-eraser"></i> &nbsp; Clear Log</button>
        </div>
        <textarea id="log" readonly style="width:100%; height:300px; overflow:auto;"></textarea>
        <br>
        <div class="is-inline-flex" style="align-items: center; gap: 0.5rem;">
            BLE Connection Interval: <input type="text" id="itvl_min" size="2" value="6" onchange="input_change()">
            to <input type="text" id="itvl_max" size="2" value="12" onchange="input_change()">
            <label class="checkbox"><input type="checkbox" id="save_conf_en" onchange="input_change()"> Write to Flash</label>
            <button class="button is-small" id="set_ble_itvl_btn"><i class="fa fa-wrench"></i> &nbsp; Set to Device</button>
        </div>
        <br>
        <div class="button is-small" style="margin: 5px 0;">
            <input class="file-input" type="file" id="open_hex">
            <i class="fa fa-file-image"></i> &nbsp; <span id="hex_file_name">Open HEX Firmware</span>
        </div>
        <button class="button is-small" id="at32_ota_btn" disabled><i class="fa fa-microchip"></i> &nbsp; Main Board OTA</button>
        <button class="button is-small" id="esp32_ota_btn" disabled><i class="fa fa-microchip"></i> &nbsp; BLE Board OTA</button>
    </div>
</section>

</body>
<script type="module" src="./js/app.js"></script>
</html>
